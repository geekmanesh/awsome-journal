info:
  name: Get Token
  type: http
  seq: 2

http:
  method: POST
  url: "{{base_url}}/token"
  body:
    type: multipart-form
    data:
      - name: username
        type: text
        value: hamid
      - name: password
        type: text
        value: hamid1234
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
