{% include 'layout.html' %}

<div class="container">
    <div class="card">
        <div class="card-header">
            Login
        </div>
        <div class="card-body">
            <form action="" id="login-form">
                <div class="form-group">
                    <label for="">Username</label>
                    <input type="text" name="username" class="form-control" autocomplete="username" required>
                
                </div>
                <div class="form-group">
                    <label for="">Password</label>
                    <input type="password" name="password" id="" class="form-control" autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn btn-primary">Login</button>
            </form>
        </div>
        <div class="card-footer">
            You haven't any account? <a href="/dashboard/register">Register</a>
        </div>
    </div>
</div>
