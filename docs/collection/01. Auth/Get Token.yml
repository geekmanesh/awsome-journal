info:
  name: Get Token
  type: http
  seq: 2

http:
  method: POST
  url: "{{base_url}}/auth/token"
  body:
    type: multipart-form
    data:
      - name: username
        type: text
        value: hossein
      - name: password
        type: text
        value: hossein1234
  auth: inherit

runtime:
  variables:
    - name: "{{auth_token}}"
      value: ""
  scripts:
    - type: after-response
      code: |-
        if (res.status == 200){
          const responseBody = res.body
          
          if (responseBody && responseBody.access_token){
            bru.setVar(auth_token, responseBody.access_token)
          }
          else{
            console.log("ERROR 2")
          }
        }
        else{
          console.log("ERROR 1")
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
