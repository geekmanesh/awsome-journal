opencollection: 1.0.0

info:
  name: Todos Collection
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  auth:
    type: bearer
    token: "{{auth_token}}"
  variables:
    - name: auth_token
      value: ""
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
